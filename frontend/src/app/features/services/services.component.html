<!-- SERVICE PORTFOLIO HEADER -->
<section class="services-portfolio-header">
  <span class="section-label section-label--center">{{ sectionLabel }}</span>
  <h2 class="services-portfolio-header__title">{{ sectionTitle }}</h2>
  <div class="services-portfolio-header__divider"></div>
</section>

<!-- SERVICE TAB NAV -->
<section class="services-tab-nav">
  <div class="services-tab-nav__grid">
    <div
      class="tab-item"
      *ngFor="let service of services; let i = index"
      [class.tab-item--active]="activeIndex === i"
      (click)="setActive(i)"
    >
      <div class="tab-item__icon">
        <span class="material-icons">{{ service.icon }}</span>
      </div>
      <span class="tab-item__label">{{ service.title }}</span>
    </div>
  </div>
</section>

<!-- SERVICES VERTICAL DISPLAY -->
<div class="services-sections">
  <section
    class="service-section"
    *ngFor="let service of services; let i = index"
    [class.service-section--alt]="i % 2 !== 0"
    [id]="'service-' + i"
  >
    <div class="service-section__container">
      <div class="service-section__grid" [class.service-section__grid--reversed]="i % 2 !== 0">
        <!-- Text Content -->
        <div class="service-section__content">
          <p class="section-label">LAYANAN</p>
          <h2 class="service-section__title">{{ service.title }}</h2>
          <p class="service-section__desc">{{ service.description }}</p>
          <ul class="service-section__features">
            <li *ngFor="let feature of service.features" class="service-section__feature-item">
              <div class="service-section__check-icon">
                <span class="material-icons">check_circle</span>
              </div>
              <span>{{ feature }}</span>
            </li>
          </ul>
        </div>
        <!-- Image -->
        <div class="service-section__image-wrap">
          <img
            [src]="service.imageUrl"
            [alt]="service.title"
            class="service-section__image"
          />
        </div>
      </div>
    </div>
  </section>
</div>

<!-- YOUR BENEFITS SECTION -->
<section class="services-benefits">
  <div class="services-benefits__container">
    <h2 class="services-benefits__title">YOUR BENEFITS</h2>
    <div class="services-benefits__grid">
      <div class="benefit-item" *ngFor="let benefit of benefits">
        <div class="benefit-item__icon">
          <span class="material-icons">{{ benefit.icon }}</span>
        </div>
        <p class="benefit-item__label">{{ benefit.label }}</p>
      </div>
    </div>
  </div>
</section>
