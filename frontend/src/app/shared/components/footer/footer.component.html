<footer class="footer">
  <div class="footer__main">
    <div class="container footer__grid">
      <!-- Brand Column -->
      <div class="footer__brand">
        <a routerLink="/" class="footer__logo">
          <div class="footer__logo-icon">
            <span class="material-icons">precision_manufacturing</span>
          </div>
          <span class="footer__logo-text">MTJM</span>
        </a>
        <p class="footer__tagline">{{ companyTagline }}</p>
      </div>

      <!-- Links Column -->
      <div class="footer__column">
        <h4 class="footer__column-title">Links</h4>
        <ul class="footer__links">
          <li *ngFor="let link of footerLinks">
            <a [routerLink]="link.route" class="footer__link">{{ link.label }}</a>
          </li>
        </ul>
      </div>

      <!-- Contact Column -->
      <div class="footer__column">
        <h4 class="footer__column-title">Contact</h4>
        <ul class="footer__contact-list">
          <li class="footer__contact-item">
            <span class="material-icons footer__contact-icon">location_on</span>
            <span>{{ contactInfo.location }}</span>
          </li>
          <li class="footer__contact-item">
            <span class="material-icons footer__contact-icon">mail_outline</span>
            <span>{{ contactInfo.email }}</span>
          </li>
        </ul>
      </div>
    </div>
  </div>

  <!-- Copyright Bar -->
  <div class="footer__copyright">
    <div class="container">
      <p>&copy; {{ currentYear }} PT Multi Tehnik Jaya Mandiri. All rights reserved. Engineering Excellence.</p>
    </div>
  </div>
</footer>
